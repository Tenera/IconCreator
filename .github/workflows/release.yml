name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - rid: win-x64
            name: IconCreator-win-x64
          - rid: linux-x64
            name: IconCreator-linux-x64
          - rid: osx-x64
            name: IconCreator-osx-x64
          - rid: osx-arm64
            name: IconCreator-osx-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: >
          dotnet publish src/IconCreator.Avalonia/IconCreator.Avalonia.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained
          /p:PublishSingleFile=true
          /p:PublishAot=false
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:DebugType=none
          --output publish/${{ matrix.name }}

      - name: Remove PDB files
        run: find publish/${{ matrix.name }} -name '*.pdb' -delete

      - name: Set executable permission
        if: ${{ !contains(matrix.rid, 'win') }}
        run: chmod +x publish/${{ matrix.name }}/IconCreator.Avalonia

      - name: Zip artifact
        run: cd publish && zip -r ../${{ matrix.name }}.zip ${{ matrix.name }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}.zip
          generate_release_notes: true
